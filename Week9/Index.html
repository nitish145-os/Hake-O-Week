<!DOCTYPE html>
<html>
<head>
  <title>Weather Bar Graph</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: "Inter", sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 500px;
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      font-weight: 500;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Temperature Comparison</h2>
  <canvas id="weatherChart"></canvas>
</div>

<script>
const ctx = document.getElementById('weatherChart');

new Chart(ctx, {
  type: 'bar',
  data: {
    labels: ['Nagpur', 'Mumbai', 'Delhi'],
    datasets: [{
      label: 'Temperature (°C)',
      data: [32, 30, 28],
      backgroundColor: [
        '#38bdf8',
        '#60a5fa',
        '#818cf8'
      ],
      borderRadius: 8
    }]
  },
  options: {
    responsive: true,
    plugins: {
      legend: {
        labels: {
          color: 'white'
        }
      }
    },
    scales: {
      x: {
        ticks: { color: 'white' }
      },
      y: {
        ticks: { color: 'white' }
      }
    }
  }
});
</script>

</body>
</html>
