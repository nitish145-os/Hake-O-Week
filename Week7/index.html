<!DOCTYPE html>
<html>
<head>
  <title>To-Do App</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: "Poppins", sans-serif;
      background: #f5f7fa;
      display: flex;
      justify-content: center;
      padding-top: 50px;
    }

    .app {
      background: white;
      padding: 20px;
      width: 350px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
    }

    .input-box {
      display: flex;
      margin-top: 10px;
    }

    input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      margin-left: 5px;
      padding: 10px;
      border: none;
      background: #0077ff;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    ul {
      list-style: none;
      margin-top: 15px;
      padding: 0;
    }

    li {
      display: flex;
      justify-content: space-between;
      padding: 8px;
      border-bottom: 1px solid #eee;
    }

    .completed {
      text-decoration: line-through;
      color: gray;
    }

    .filters {
      margin-top: 10px;
      display: flex;
      justify-content: space-between;
    }

    .filters button {
      background: #eee;
      color: black;
    }

    .clear {
      background: red;
      width: 100%;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="app">
  <h2>To-Do List</h2>

  <div class="input-box">
    <input id="taskInput" placeholder="Add task...">
    <button onclick="addTask()">Add</button>
  </div>

  <div class="filters">
    <button onclick="filterTasks('all')">All</button>
    <button onclick="filterTasks('completed')">Done</button>
    <button onclick="filterTasks('pending')">Pending</button>
  </div>

  <ul id="taskList"></ul>

  <button class="clear" onclick="clearAll()">Clear All</button>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let filter = "all";

function save() {
  localStorage.setItem("tasks", JSON.stringify(tasks));
}

function addTask() {
  const input = document.getElementById("taskInput");
  if (input.value === "") return;

  tasks.push({ text: input.value, done: false });
  input.value = "";
  save();
  render();
}

function toggleTask(i) {
  tasks[i].done = !tasks[i].done;
  save();
  render();
}

function deleteTask(i) {
  tasks.splice(i, 1);
  save();
  render();
}

function filterTasks(f) {
  filter = f;
  render();
}

function clearAll() {
  tasks = [];
  save();
  render();
}

function render() {
  const list = document.getElementById("taskList");
  list.innerHTML = "";

  tasks.forEach((t, i) => {
    if (
      (filter === "completed" && !t.done) ||
      (filter === "pending" && t.done)
    ) return;

    const li = document.createElement("li");

    li.innerHTML = `
      <span onclick="toggleTask(${i})" class="${t.done ? 'completed' : ''}">
        ${t.text}
      </span>
      <button onclick="deleteTask(${i})">X</button>
    `;

    list.appendChild(li);
  });
}

render();
</script>

</body>
</html>
